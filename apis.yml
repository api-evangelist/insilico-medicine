aid: insilico-medicine
name: Insilico Medicine
description: >-
  Insilico Medicine is a clinical-stage biotechnology company applying
  generative AI and robotic automation to drug discovery and development.
  Its Pharma.AI software suite includes PandaOmics (target discovery from
  multi-omics data), Chemistry42 (generative chemistry with retrosynthesis,
  property prediction, and ADMET), Generative Biologics, inClinico (clinical
  trial outcome prediction), Science42 DORA (research assistant), Nach01,
  and PreciousGPT-family models for life sciences. The company runs its own
  therapeutic pipeline spanning oncology, fibrosis, and inflammation, with
  programs targeting TNIK, USP1, QPCTL, PHD, MAT2A, TEAD, ENPP1, KAT6 and
  others through Phase II. Insilico monetizes through Pharma.AI software
  licensing, partnerships with major pharmaceutical companies, and progression
  of its in-house assets. Pharma.AI tools are commercial SaaS products
  accessed via web UI; the company publishes open-source research code on
  GitHub (GENTRL, fcd_torch, BiAAE, DD-VAE, DORA) but does not expose a
  public commercial API.
